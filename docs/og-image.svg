<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a3e"/>
      <stop offset="50%" stop-color="#0f0f20"/>
      <stop offset="100%" stop-color="#0a1a2e"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="200" y1="200" x2="900" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c5cfc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#7c5cfc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c5cfc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- BG -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#a78bfa" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Border -->
  <rect x="32" y="32" width="1136" height="566" rx="20" fill="none" stroke="#3a2a6e" stroke-width="2" opacity="0.6"/>

  <!-- Brain emoji (text-based) -->
  <text x="600" y="220" text-anchor="middle" font-size="120">🧠</text>

  <!-- Title -->
  <text x="600" y="310" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="80" font-weight="800" fill="url(#title-grad)" letter-spacing="-2">
    byte-by-byte
  </text>

  <!-- Tagline EN -->
  <text x="600" y="374" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="30" font-weight="500" fill="#c4b5fd" opacity="0.9">
    A little bit every day. A lot over time.
  </text>

  <!-- Tagline ZH -->
  <text x="600" y="416" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="26" font-weight="400" fill="#a78bfa" opacity="0.7">
    每天一点，积少成多
  </text>

  <!-- Section pills -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#7a6ab0">
    <!-- 5 topic pills -->
    <rect x="170" y="465" width="148" height="36" rx="18" fill="#2a1a5e" opacity="0.7"/>
    <text x="244" y="488" text-anchor="middle" fill="#c4b5fd" font-size="17">🏗️ System Design</text>

    <rect x="333" y="465" width="120" height="36" rx="18" fill="#2a1a5e" opacity="0.7"/>
    <text x="393" y="488" text-anchor="middle" fill="#c4b5fd" font-size="17">💻 Algorithms</text>

    <rect x="468" y="465" width="114" height="36" rx="18" fill="#2a1a5e" opacity="0.7"/>
    <text x="525" y="488" text-anchor="middle" fill="#c4b5fd" font-size="17">🗣️ Soft Skills</text>

    <rect x="597" y="465" width="104" height="36" rx="18" fill="#2a1a5e" opacity="0.7"/>
    <text x="649" y="488" text-anchor="middle" fill="#c4b5fd" font-size="17">🎨 Frontend</text>

    <rect x="716" y="465" width="74" height="36" rx="18" fill="#2a1a5e" opacity="0.7"/>
    <text x="753" y="488" text-anchor="middle" fill="#c4b5fd" font-size="17">🤖 AI</text>
  </g>

  <!-- Bottom label -->
  <text x="600" y="565" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="20" fill="#6a5a90" opacity="0.6">
    yushengauggie.github.io/byte-by-byte
  </text>
</svg>
